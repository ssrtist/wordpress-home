<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coco's Yesterday Book</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #book {
            width: 80%;
            max-width: 800px;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            /* make sure book area has consistent height */
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #book img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .image-container {
            min-height: 200px; /* reserve enough space for images */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-title {
            font-size: 2em;
            line-height: 1.4;
            min-height: 3em;
        }
        .nav {
            font-size: 1em;
            padding: 10px 20px;
            cursor: pointer;
        }
        .nav.disabled {
            opacity: 0.5;
            cursor: default;
        }
        .button-row {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div id="book">
    <div class="page-title" id="pageTitle"></div>
    <div class="image-container">
        <img id="pageImage" src="" alt="" />
    </div>
    <div class="button-row">
        <button id="prev" class="nav">Back</button>
        <button id="next" class="nav">Next</button>
    </div>
</div>

<script>
    const blankImage = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%221600%22 height=%221200%22%3E%3Crect width=%221600%22 height=%221200%22 fill=%22%23f5f5f5%22/%3E%3C/svg%3E';
    
    const pages = [
        {title: "Yesterday was Friday.", image: blankImage},
        {title: "Yesterday, in the morning, Coco went to school.", image: "01-go to school.png"},
        {title: "Yesterday, in the morning, Coco went inside school with Daddy.", image: "02-drop off.png"},
        {title: "Yesterday, in the afternoon, Daddy picked Coco up from school.", image: "03-pick up.png"},
        {title: "Yesterday, in the afternoon, Coco went home.", image: "04-go home.png"},
        {title: "The end.", image: blankImage}
    ];

    let current = 0;
    const pageTitle = document.getElementById('pageTitle');
    const pageImage = document.getElementById('pageImage');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');

    function render() {
        const p = pages[current];
        pageTitle.textContent = p.title;
        if (p.image) {
            pageImage.src = p.image;
            pageImage.style.display = 'block';
        } else {
            pageImage.style.display = 'none';
        }
        prev.classList.toggle('disabled', current === 0);
        next.classList.toggle('disabled', current === pages.length - 1);
    }

    prev.addEventListener('click', () => {
        if (current > 0) {
            current--;
            render();
        }
    });

    next.addEventListener('click', () => {
        if (current < pages.length - 1) {
            current++;
            render();
        }
    });
    function render() {
        const p = pages[current];
        pageTitle.textContent = p.title;
        if (p.image) {
            pageImage.src = p.image;
            pageImage.style.visibility = 'visible';
        } else {
            pageImage.src = '';
            pageImage.style.visibility = 'hidden';
        }
        prev.classList.toggle('disabled', current === 0);
        next.classList.toggle('disabled', current === pages.length - 1);
    }
    render();
</script>
</body>
</html>
