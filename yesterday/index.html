<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coco's Yesterday Book</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #book {
            width: 80%;
            max-width: 800px;
            height: 90vh;
            max-height: 1000px;
            background: white;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .image-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        #book img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
        }
        .page-title {
            font-size: 1.8em;
            line-height: 1.4;
            text-align: center;
            padding: 10px;
            min-height: 2.8em;
        }
        .page-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 1.2em;
            color: #aaa;
        }
        .nav {
            font-size: 1.2em;
            padding: 12px 25px;
            cursor: pointer;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: 6px;
        }
        .nav.disabled {
            opacity: 0.5;
            cursor: default;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        #bookSelector {
            margin-bottom: 20px;
        }
        .the-end-page .page-title {
            font-size: 3em;
        }
    </style>
</head>
<body>
<div id="book">
    <div id="bookSelector" style="margin-bottom: 20px;"></div>
    <div class="image-container">
        <img id="pageImage" src="" alt="" />
    </div>
    <div class="page-title" id="pageTitle"></div>
    <div class="page-number" id="pageNumber"></div>
    <div class="button-row">
        <button id="prev" class="nav">Back</button>
        <button id="next" class="nav">Next</button>
    </div>
</div>

<script>
    const blankImage = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%221600%22 height=%221200%22%3E%3Crect width=%221600%22 height=%221200%22 fill=%22%23f5f5f5%22/%3E%3C/svg%3E';
    
    let allBooks = [];
    let currentBook = null;
    let pages = [];
    const _preloadedImages = []; // keep references so GC doesn't drop them

    function preloadAllImages(books) {
        const promises = [];
        _preloadedImages.length = 0; // clear previous references
        if (!books || !books.length) return Promise.resolve();
        books.forEach(book => {
            if (!book.pages) return;
            book.pages.forEach(p => {
                if (!p || !p.image) return;
                try {
                    const img = new Image();
                    const pr = new Promise(resolve => {
                        img.onload = () => resolve({ img, status: 'ok' });
                        img.onerror = () => resolve({ img, status: 'error' });
                    });
                    img.src = p.image;
                    _preloadedImages.push(img);
                    promises.push(pr);
                } catch (e) {
                    // ignore any image creation errors
                }
            });
        });
        if (!promises.length) return Promise.resolve();
        return Promise.all(promises);
    }

    const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });

    function getRelativeDateLabel(dateStr) {
        // Parse date string in format "M/D/YYYY"
        const dateMatch = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if (!dateMatch) return dateStr;

        const [, month, day, year] = dateMatch;
        const eventDate = new Date(Date.UTC(year, month - 1, day));
        
        // Use Saturday, March 14, 2026, as "today" for consistent results
        const today = new Date(Date.UTC(2026, 2, 14));

        // Calculate the difference in days
        const diffDays = Math.round((eventDate - today) / (1000 * 60 * 60 * 24));

        // Intl.RelativeTimeFormat can't format 0 days, so handle 'Today' separately.
        if (diffDays === 0) return 'Today';

        // Decide the unit based on the magnitude of the difference.
        const diffAbsDays = Math.abs(diffDays);

        if (diffAbsDays < 7) {
            return rtf.format(diffDays, 'day');
        }
        
        if (diffAbsDays < 30) {
            const diffWeeks = Math.round(diffDays / 7);
            return rtf.format(diffWeeks, 'week');
        }
        
        if (diffAbsDays < 365) {
            const diffMonths = Math.round(diffDays / 30.44);
            return rtf.format(diffMonths, 'month');
        }
        
        const diffYears = Math.round(diffDays / 365.25);
        return rtf.format(diffYears, 'year');
    }

    function replaceDateMarkers(text) {
        // Replace all {{ date }} markers with relative date labels
        return text.replace(/\{\{\s*(\d{1,2}\/\d{1,2}\/\d{4})\s*\}\}/g, (match, dateStr) => {
            return getRelativeDateLabel(dateStr);
        });
    }

    function processBooks(books) {
        // Process all books and pages to replace date markers
        books.forEach(book => {
            book.title = replaceDateMarkers(book.title);
            if (book.pages) {
                book.pages.forEach(page => {
                    if (page.title) {
                        page.title = replaceDateMarkers(page.title);
                    }
                });
            }
        });
    }

    // fetch pages.json on page load
    fetch('pages.json')
        .then(resp => resp.json())
        .then(data => {
            processBooks(data.books);
            allBooks = data.books;
            // preload images and wait for completion before showing first page
            preloadAllImages(allBooks)
                .then(() => {
                    createBookSelector();
                    selectBook(allBooks[0].id);
                })
                .catch(() => {
                    // on any unexpected error, still initialize the UI
                    createBookSelector();
                    selectBook(allBooks[0].id);
                });
        })
        .catch(err => console.error('Failed to load pages.json', err));

    const pageTitle = document.getElementById('pageTitle');
    const pageImage = document.getElementById('pageImage');
    const pageNumber = document.getElementById('pageNumber');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    let current = 0;

    function createBookSelector() {
        const selector = document.getElementById('bookSelector');
        const label = document.createElement('div');
        label.style.fontSize = '0.9em';
        label.style.marginBottom = '10px';
        label.style.color = '#666';
        label.textContent = 'Choose a story:';
        selector.appendChild(label);
        
        const buttonContainer = document.createElement('div');
        buttonContainer.style.display = 'flex';
        buttonContainer.style.gap = '10px';
        buttonContainer.style.justifyContent = 'center';
        buttonContainer.style.flexWrap = 'wrap';
        
        allBooks.forEach(book => {
            const btn = document.createElement('button');
            btn.textContent = book.title;
            btn.className = 'book-select-btn';
            btn.style.padding = '8px 16px';
            btn.style.border = '2px solid #ccc';
            btn.style.borderRadius = '4px';
            btn.style.cursor = 'pointer';
            btn.style.fontSize = '0.9em';
            btn.style.backgroundColor = '#f9f9f9';
            btn.onclick = () => selectBook(book.id);
            buttonContainer.appendChild(btn);
        });
        
        selector.appendChild(buttonContainer);
    }

    function selectBook(bookId) {
        currentBook = allBooks.find(b => b.id === bookId);
        pages = currentBook.pages;
        current = 0;
        
        // Update button styles
        document.querySelectorAll('.book-select-btn').forEach(btn => {
            btn.style.backgroundColor = btn.textContent === currentBook.title ? '#e0e0e0' : '#f9f9f9';
            btn.style.borderColor = btn.textContent === currentBook.title ? '#666' : '#ccc';
        });
        
        render();
    }

    prev.addEventListener('click', () => {
        if (current > 0) {
            current--;
            render();
        }
    });

    next.addEventListener('click', () => {
        if (current < pages.length - 1) {
            current++;
            render();
        }
    });

    function render() {
        if (!pages.length) return;
        const p = pages[current];
        pageTitle.textContent = p.title;
        if (p.image) {
            pageImage.src = p.image;
            pageImage.style.visibility = 'visible';
        } else {
            pageImage.src = blankImage;
            pageImage.style.visibility = 'visible';
        }
        pageNumber.textContent = current + 1;

        if (p.title.toLowerCase() === 'the end.') {
            document.getElementById('book').classList.add('the-end-page');
        } else {
            document.getElementById('book').classList.remove('the-end-page');
        }

        prev.classList.toggle('disabled', current === 0);
        next.classList.toggle('disabled', current === pages.length - 1);
    }
</script>
</body>
</html>
